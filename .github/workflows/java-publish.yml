name: Publish Java Library to Maven Central

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v1.0.0

jobs:
  publish:
    name: Release to Maven Central
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          # GPG is imported manually below — do NOT pass gpg-private-key here
          # to avoid the "Failed to remove private key" post-job cleanup error.

      - name: Import GPG private key
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --import --batch --no-tty
          gpg --list-secret-keys --keyid-format LONG
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build & test
        working-directory: benatti-auth-starter
        run: mvn verify -B
        env:
          MAVEN_OPTS: >-
            --add-opens java.base/java.lang=ALL-UNNAMED
            --add-opens java.base/java.util=ALL-UNNAMED
            -Dnet.bytebuddy.experimental=true

      - name: Publish to Maven Central
        working-directory: benatti-auth-starter
        run: mvn deploy -P release -DskipTests -B
        env:
          MAVEN_USERNAME:  ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD:  ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_OPTS: >-
            --add-opens java.base/java.lang=ALL-UNNAMED
            -Dnet.bytebuddy.experimental=true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            benatti-auth-starter/target/*.jar
